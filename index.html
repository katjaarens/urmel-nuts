<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urmel & Nuts - Home</title>
    
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <py-config>
        packages = ["sqlite3"]
    </py-config>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="urmel.html">Urmel</a>
        <a href="nuts.html">Nuts</a>
        <a href="abenteuer.html">Abenteuer</a>
    </nav>

    <div class="container">
        <h1>Urmel & Nuts 🐾</h1>
        
        <div id="db-content">
            <p style="text-align:center;">Lade Hunde-Datenbank...</p>
        </div>

        <div class="input-group">
            <input type="text" id="name" placeholder="Hundename">
            <input type="text" id="trick" placeholder="Neuer Trick">
            <button id="add-btn" py-click="add_entry">Speichern</button>
        </div>
    </div>

    <script type="py">
import sqlite3
from pyscript import document

# 1. Datenbank im RAM
conn = sqlite3.connect(':memory:', check_same_thread=False)
cursor = conn.cursor()

# 2. Start-Daten
cursor.execute("CREATE TABLE dogs (name TEXT, trick TEXT)")
cursor.execute("INSERT INTO dogs VALUES ('Urmel', 'High Five'), ('Nuts', 'Rolle rückwärts')")
conn.commit()

def refresh_ui():
    cursor.execute("SELECT * FROM dogs")
    data = cursor.fetchall()
    
    output = "<ul>"
    for name, trick in data:
        output += f"<li><span><strong>{name}</strong></span> <span>{trick}</span></li>"
    output += "</ul>"
    
    document.querySelector("#db-content").innerHTML = output

def add_entry(event):
    name_el = document.querySelector("#name")
    trick_el = document.querySelector("#trick")
    
    if name_el.value and trick_el.value:
        cursor.execute("INSERT INTO dogs VALUES (?, ?)", (name_el.value, trick_el.value))
        conn.commit()
        refresh_ui()
        name_el.value = ""
        trick_el.value = ""

refresh_ui()
    </script>

</body>
</html>
