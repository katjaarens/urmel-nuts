<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Versteckt den Python-Code, bis PyScript geladen ist */
        script[type="py"] { display: none; }
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f2f5; text-align: center; }
        .card { background: white; border-radius: 30px; padding: 40px; max-width: 500px; margin: 40px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .btn-main { background: #2c5282; color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

    <nav style="padding: 20px; gap: 20px; display: flex; justify-content: center;">
        <a href="index.html" style="text-decoration: none; color: #606770;">← Zurück zum Dashboard</a>
    </nav>

    <div class="card">
        <h1>Wuff-O-Meter</h1>
        <div id="output" style="margin: 20px; min-height: 50px; font-style: italic;">Bereit für die Übersetzung?</div>
        <button class="btn-main" py-click="translate">🐾 Übersetzen</button>
    </div>

    <audio id="b1" src="bellen_1.mp3"></audio>
    <audio id="b2" src="bellen_2.mp3"></audio>
    <audio id="b3" src="bellen_3.mp3"></audio>
    <audio id="b4" src="bellen_4.mp3"></audio>
    <audio id="b5" src="bellen_5.mp3"></audio>

    <script type="py">
import random
import asyncio
from pyscript import document

async def translate(event):
    out = document.getElementById("output")
    out.innerHTML = "Analysiere Wuff..."
    
    # Sound abspielen
    try:
        s_id = random.choice(["b1", "b2", "b3", "b4", "b5"])
        document.getElementById(s_id).play()
    except:
        pass

    await asyncio.sleep(1)
    
    ans = [
        "Hunger! Immer Hunger!", 
        "Da war ein Eichhörnchen!", 
        "Kraul mich jetzt!", 
        "Lass uns Gassi gehen!"
    ]
    out.innerHTML = random.choice(ans)
    </script>
</body>
</html>
